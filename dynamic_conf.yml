    ollama-router:
      rule: "Host(`ollama.markridgwell.com`)"
      service: ollama-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - ollama-header

    linux-cache-01-router:
      rule: "Host(`linux-cache-01.markridgwell.com`)"
      service: linux-cache-01-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
