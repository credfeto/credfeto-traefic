  services:
    # Services for each router
    pacman-service:
      loadBalancer:
        serversTransport: pacman
        healthCheck:
          path: /ping
          interval: 30s
          timeout: 5s
        servers:
          - url: "https://192.168.150.200:7777"
          - url: "https://192.168.150.201:7777"

    aur-service:
