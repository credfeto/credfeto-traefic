# dynamic_conf.yml
http:
  routers:
    # Dashboard router
    traefik-dashboard:
      rule: "Host(`proxy.markridgwell.com`)"
      service: api@internal
      entryPoints:
        - web-secure
      tls: {}
      # No middleware for authentication now

    # API NuGet router
    api-nuget-router:
      rule: "Host(`api-nuget.markridgwell.com`)"
      service: api-nuget-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - api-nuget-header

    # Funfair NuGet router
    funfair-nuget-router:
      rule: "Host(`funfair-nuget.markridgwell.com`)"
      service: funfair-nuget-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - funfair-nuget-header

    # Funfair Prerelease NuGet router
    funfair-prerelease-nuget-router:
      rule: "Host(`funfair-prerelease-nuget.markridgwell.com`)"
      service: funfair-nuget-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - funfair-prerelease-nuget-header

    # New npm router
    npm-router:
      rule: "Host(`npm.markridgwell.com`)"
      service: npm-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - npm-header

    # New dotnet router
    dotnet-router:
      rule: "Host(`dotnet.markridgwell.com`)"
      service: dotnet-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - dotnet-header

    # New hosts
    pacman-router:
      rule: "Host(`pacman.markridgwell.com`)"
      service: pacman-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - pacman-header

    aur-router:
      rule: "Host(`aur.markridgwell.com`)"
      service: aur-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - aur-header

    flathub-router:
      rule: "Host(`flathub.markridgwell.com`)"
      service: flathub-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - flathub-header

    aur-repo-router:
      rule: "Host(`aur-repo.markridgwell.com`)"
      service: aur-repo-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - aur-repo-header

    photos-router:
      rule: "Host(`photos.markridgwell.com`)"
      service: photos-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - photos-header

    homeassistant-router:
      rule: "Host(`homeassistant.markridgwell.com`)"
      service: homeassistant-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - homeassistant-header

    audiobookshelf-router:
      rule: "Host(`audiobookshelf.markridgwell.com`)"
      service: audiobookshelf-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - audiobookshelf-header

    home-router:
      rule: "Host(`home.markridgwell.com`)"
      service: home-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - home-header

    docker-registry-router:
      rule: "Host(`docker-registry.markridgwell.com`)"
      service: docker-registry-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - docker-registry-header

    docker-cache-router:
      rule: "Host(`docker-cache.markridgwell.com`)"
      service: docker-cache-service
      entryPoints:
        - web-secure
      tls: {}
      middlewares:
        - docker-cache-header

    mastodon-router:
