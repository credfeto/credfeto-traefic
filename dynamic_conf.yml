    dns-router:
      rule: "Host(`dns.markridgwell.com`)"
      service: dns-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - dns-header

    dns-01-router:
      rule: "Host(`dns-01.markridgwell.com`)"
      service: dns-01-service
      entryPoints:
