# dynamic_conf.yml
tls:
  options:
    default:
      minVersion: VersionTLS13
      sniStrict: true

http:
  serversTransports:
    pacman:
      insecureSkipVerify: true
      serverName: "pacman.local"
    aur:
      insecureSkipVerify: true
      serverName: "aur.local"
    aur-repo:
      insecureSkipVerify: true
      serverName: "aur-repo.local"
    mastodon:
      insecureSkipVerify: true
      serverName: "mastodon.markridgwell.com"
    defi:
      insecureSkipVerify: true
      serverName: "defi.local"
    ollama:
      insecureSkipVerify: true
      serverName: "ollama.local"
    flathub:
      insecureSkipVerify: true
      serverName: "flathub.markridgwell.com"
    dns:
      insecureSkipVerify: true
      serverName: "dns.markridgwell.com"

    api-nuget:
      insecureSkipVerify: true
      serverName: "api.nuget.local"
    funfair-nuget:
      insecureSkipVerify: true
      serverName: "funfair.nuget.local"
    funfair-prerelease-nuget:
      insecureSkipVerify: true
      serverName: "funfair-prerelease.nuget.local"
    npm:
      insecureSkipVerify: true
      serverName: "npm.local"
    dotnet:
      insecureSkipVerify: true
      serverName: "builds.dotnet.local"

  routers:
    # Dashboard router
    traefik-dashboard:
      rule: "Host(`proxy.markridgwell.com`)"
      service: api@internal
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
        domains:
          - main: "markridgwell.com"
            sans:
              - "*.markridgwell.com"
      # No middleware for authentication now

    # API NuGet router
    api-nuget-router:
      rule: "Host(`api-nuget.markridgwell.com`)"
      service: api-nuget-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - api-nuget-header

    # Funfair NuGet router
    funfair-nuget-router:
      rule: "Host(`funfair-nuget.markridgwell.com`)"
      service: funfair-nuget-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - funfair-nuget-header

    # Funfair Prerelease NuGet router
    funfair-prerelease-nuget-router:
      rule: "Host(`funfair-prerelease-nuget.markridgwell.com`)"
      service: funfair-prerelease-nuget-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - funfair-prerelease-nuget-header

    # New npm router
    npm-router:
      rule: "Host(`npm.markridgwell.com`)"
      service: npm-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - npm-header

    # New dotnet router
    dotnet-router:
      rule: "Host(`dotnet.markridgwell.com`)"
      service: dotnet-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - dotnet-header

    # New hosts
    pacman-router:
      rule: "Host(`pacman.markridgwell.com`)"
      service: pacman-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - pacman-header

    aur-router:
      rule: "Host(`aur.markridgwell.com`)"
      service: aur-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - aur-header

    flathub-router:
      rule: "Host(`flathub.markridgwell.com`)"
      service: flathub-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - flathub-header

    aur-repo-router:
      rule: "Host(`aur-repo.markridgwell.com`)"
      service: aur-repo-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - aur-repo-header

    photos-router:
      rule: "Host(`photos.markridgwell.com`)"
      service: photos-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - photos-header

    homeassistant-router:
      rule: "Host(`homeassistant.markridgwell.com`)"
      service: homeassistant-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - homeassistant-header

    audiobookshelf-router:
      rule: "Host(`audiobookshelf.markridgwell.com`)"
      service: audiobookshelf-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - audiobookshelf-header

    home-router:
      rule: "Host(`home.markridgwell.com`)"
      service: home-service
      entryPoints:
        - web-secure
      tls:
        certResolver: letsencrypt
      middlewares:
        - home-header

    docker-registry-router:
